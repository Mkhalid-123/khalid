<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Student System</title>
  <meta name="description" content="Create a new Student System account">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text-white: #f8fafc;
      --text-gray: #94a3b8;
      --border: #334155;
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .signup-wrapper {
      width: 100%;
      max-width: 420px;
    }

    /* Logo area */
    .brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px var(--primary-glow);
    }

    .brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-white);
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 0.9rem;
      color: var(--text-gray);
      margin-top: 6px;
    }

    /* Card */
    .signup-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 35px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .signup-card h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-white);
      margin-bottom: 6px;
    }

    .signup-card .subtitle {
      font-size: 0.85rem;
      color: var(--text-gray);
      margin-bottom: 25px;
    }

    /* Input Fields */
    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-gray);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      background: rgba(15, 23, 42, 0.7);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text-white);
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-wrapper input::placeholder {
      color: #64748b;
    }

    .input-wrapper input:focus {
      border-color: var(--primary);
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    /* Sign Up Button */
    .signup-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px var(--primary-glow);
      margin-top: 8px;
    }

    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--primary-glow);
    }

    .signup-btn:active {
      transform: translateY(0);
    }

    .signup-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Sign In Button */
    .signin-btn {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text-gray);
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .signin-btn:hover {
      border-color: var(--primary);
      color: var(--text-white);
      background: rgba(99, 102, 241, 0.1);
    }

    /* Message */
    .msg {
      text-align: center;
      margin-top: 14px;
      font-size: 0.85rem;
      min-height: 20px;
      font-weight: 500;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 20px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 0.75rem;
      color: var(--text-gray);
      white-space: nowrap;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .signup-card {
        padding: 25px 20px;
        border-radius: 16px;
      }

      .brand h1 {
        font-size: 1.3rem;
      }

      .brand-icon {
        width: 50px;
        height: 50px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="signup-wrapper">
    <div class="brand">
      <div class="brand-icon">
        🎓
      </div>
      <h1>Student System</h1>
      <p>Your complete academic management platform</p>
    </div>

    <div class="signup-card">
      <h2>Create Account</h2>
      <p class="subtitle">Join thousands of students managing their academics</p>

      <div class="input-group">
        <label for="name">Full Name</label>
        <div class="input-wrapper">
          <input id="name" type="text" placeholder="John Doe">
        </div>
      </div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input id="email" type="email" placeholder="you@example.com">
        </div>
      </div>

      <div class="input-group">
        <label for="pass">Password</label>
        <div class="input-wrapper">
          <input id="pass" type="password" placeholder="••••••••">
        </div>
      </div>

      <div class="input-group">
        <label for="cpass">Confirm Password</label>
        <div class="input-wrapper">
          <input id="cpass" type="password" placeholder="••••••••">
        </div>
      </div>

      <button class="signup-btn" id="signup-btn" onclick="signup()">
        Create Account
      </button>

      <p class="msg" id="msg"></p>

      <div class="divider"><span>Already have an account?</span></div>

      <button class="signin-btn" onclick="window.location.href='signin.html'">
        Sign In Instead
      </button>
    </div>
  </div>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCZjge0YwVcqxLI2TMDfWvEqwBywMDJo2I",
      authDomain: "project-56e53.firebaseapp.com",
      projectId: "project-56e53",
      storageBucket: "project-56e53.firebasestorage.app",
      messagingSenderId: "188996642263",
      appId: "1:188996642263:web:62976517938a3a16efd792"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function signup() {

      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let pass = document.getElementById("pass").value;
      let cpass = document.getElementById("cpass").value;
      let msg = document.getElementById("msg");
      let btn = document.getElementById("signup-btn");

      if (pass !== cpass) {
        msg.style.color = "#ef4444";
        msg.innerHTML = '✗ Passwords do not match!';
        return;
      }

      // Show loading
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account...';
      msg.style.color = "#94a3b8";
      msg.innerHTML = '';

      auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {

          let user = userCredential.user;

          user.updateProfile({
            displayName: name
          });

          msg.style.color = "#22c55e";
          msg.innerHTML = '✓ Account created successfully! Redirecting...';

          setTimeout(() => {
              window.location.href = "student.html";
          }, 1500);

        })
        .catch((error) => {
          btn.disabled = false;
          btn.innerHTML = 'Create Account';
          msg.style.color = "#ef4444";
          msg.innerHTML = '✗ ' + error.message;
        });
    }
  </script>

</body>
</html>
